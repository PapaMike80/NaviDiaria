<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cambia PIN · NaviDiaria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
</head>
<body><main class="portal-shell">
  <section class="portal-intro"><a class="portal-brand" href="index.html"><span>N</span>NaviDiaria</a><div><p class="eyebrow">SICUREZZA</p><h1>Il tuo PIN,<br><em>solo tuo.</em></h1><p class="intro-copy">Scegli un codice personale e non condividerlo con altri.</p></div><p class="local-note"><i></i>Il nuovo PIN viene salvato in modo protetto</p></section>
  <section class="portal-panel"><form id="changePinForm" class="access-card"><p class="eyebrow">CAMBIO PIN</p><h2 id="changePinTitle">Modifica il PIN</h2><p>Inserisci il PIN attuale e scegli il nuovo PIN personale.</p><label>PIN attuale<input id="currentPin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" autocomplete="current-password" required></label><label>Nuovo PIN<input id="newPin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" autocomplete="new-password" required></label><label>Conferma nuovo PIN<input id="confirmPin" type="password" inputmode="numeric" pattern="[0-9]{4,8}" minlength="4" maxlength="8" autocomplete="new-password" required></label><p id="changePinMessage" class="form-message" aria-live="polite"></p><button id="changePinSubmit" type="submit">Salva nuovo PIN <span>→</span></button><button id="cancelPinButton" class="secondary-form-button" type="button">Annulla</button></form></section>
</main><script src="cloud-data.js"></script><script src="cambia-pin.js"></script></body></html>
